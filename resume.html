<style>
    /* 技能進度條樣式 */
    .skill-container {
        margin-top: 20px;
    }
    .skill-bar {
        background: rgba(255,255,255,0.1);
        height: 10px;
        border-radius: 5px;
        margin-bottom: 15px;
        position: relative;
    }
    .skill-per {
        height: 100%;
        background: var(--accent-color);
        border-radius: 5px;
        position: relative;
        transition: width 1s ease-in-out;
    }
    .skill-name {
        font-size: 14px;
        margin-bottom: 5px;
        display: block;
    }

    /* 浮現動畫樣式 */
    .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: all 0.8s ease-out;
    }
    .reveal.active {
        opacity: 1;
        transform: translateY(0);
    }
</style>

<div class="sidebar-section reveal">
    <div class="sidebar-title">Skill Levels</div>
    <span class="skill-name">Video Editing</span>
    <div class="skill-bar"><div class="skill-per" style="width: 85%;"></div></div>
    
    <span class="skill-name">Photography</span>
    <div class="skill-bar"><div class="skill-per" style="width: 80%;"></div></div>
    
    <span class="skill-name">Web Design</span>
    <div class="skill-bar"><div class="skill-per" style="width: 70%;"></div></div>
</div>

<script>
    function reveal() {
        var reveals = document.querySelectorAll(".reveal");
        for (var i = 0; i < reveals.length; i++) {
            var windowHeight = window.innerHeight;
            var elementTop = reveals[i].getBoundingClientRect().top;
            var elementVisible = 150;
            if (elementTop < windowHeight - elementVisible) {
                reveals[i].classList.add("active");
            }
        }
    }
    window.addEventListener("scroll", reveal);
</script>
