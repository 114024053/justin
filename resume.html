<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楊程竣 - 專業數位履歷</title>
    <style>
        :root {
            --sidebar-bg: #4a4a4a;
            --main-bg: #ffffff;
            --text-dark: #333333;
            --accent-color: #3498db;
            --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --email-color: #2ecc71;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            background: #dcdcdc;
            display: flex;
            justify-content: center;
            padding: 50px 0;
        }

        .resume-container {
            width: 950px;
            background: var(--main-bg);
            display: flex;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            min-height: 1150px;
            border-radius: 12px;
            overflow: hidden;
        }

        /* 左側欄 */
        .sidebar {
            width: 32%;
            background: var(--sidebar-bg);
            color: white;
            padding: 50px 30px;
        }

        .profile-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 40px;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .sidebar-title {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        /* 聯絡資訊變色塊設計 */
        .contact-item { margin-bottom: 25px; }
        .contact-item strong { display: block; font-size: 18px; color: #bbb; margin-bottom: 8px; }
        
        .contact-box {
            display: inline-block;
            padding: 10px 15px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .contact-item.email:hover .contact-box { background: var(--email-color); transform: translateY(-3px); }
        .contact-item.ig:hover .contact-box { background: var(--ig-gradient); transform: translateY(-3px); }

        /* 技能條 */
        .skill-bar { background: rgba(255,255,255,0.1); height: 10px; border-radius: 5px; margin-bottom: 15px; overflow: hidden; }
        .skill-per { height: 100%; background: var(--accent-color); transition: 1.5s; }

        /* 右側內容 */
        .main-content { width: 68%; padding: 60px; color: var(--text-dark); }
        h1 { font-size: 60px; margin: 0; color: #2c3e50; letter-spacing: 5px; }
        .subtitle { font-size: 22px; color: #7f8c8d; margin-bottom: 50px; }
        h2 { font-size: 28px; border-left: 6px solid var(--accent-color); padding-left: 15px; margin: 40px 0 20px; }
        p { font-size: 19px; line-height: 1.8; color: #444; }

        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .project-card { background: #f8f9fa; padding: 20px; border-radius: 8px; border-top: 4px solid var(--accent-color); }
        
        .reveal { opacity: 0; transform: translateY(20px); transition: 0.8s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
